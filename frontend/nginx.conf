# frontend/nginx.conf
server {
    listen 80;
    server_name _;

    # Разрешаем загрузку больших файлов (до 500 МБ)
    client_max_body_size 500M;
    
    # Увеличиваем время ожидания при передаче тела большого файла
    client_body_timeout 300s;

    # Включаем сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Раздача собранного Vue (SPA routing)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Проксирование HTTP API к RITA Core
    location /api/ {
        proxy_pass http://core:8180/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Таймауты проксирования (чтобы бэкенд успел сохранить тяжелый файл)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # Проксирование WebSocket соединений
    location /ws/ {
        proxy_pass http://core:8180/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # Долгий таймаут для поддержания WebSocket соединения
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
